<style>
:root{
  --bg:#F6F5F1; --ink:#1E2433; --ink-soft:#5A6172; --line:#E3E1D9;
  --card:#FFFFFF; --accent:#2F5DFF; --danger:#D9494F; --ok:#2E9E6B;
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  overscroll-behavior-y:none;}
button{font-family:inherit;}
#app{max-width:520px; margin:0 auto; min-height:100vh; padding-bottom:calc(110px + var(--safe-bot));}

.header{position:sticky; top:0; z-index:10; background:var(--bg);
  padding:calc(16px + var(--safe-top)) 18px 10px;}
.eyebrow{font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--ink-soft); font-weight:600;}
.titlerow{display:flex; align-items:center; justify-content:space-between; margin-top:2px;}
.title{font-size:26px; font-weight:800; letter-spacing:-.5px;}
.subhead{display:flex; align-items:center; gap:8px;}
.subhead .name{font-size:20px; font-weight:750; flex:1; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;}
.iconbtn{background:var(--card); border:1px solid var(--line); border-radius:10px;
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  color:var(--ink); cursor:pointer; flex-shrink:0;}
.searchwrap{position:relative; margin-top:12px;}
.searchwrap>svg{position:absolute; left:12px; top:11px; color:var(--ink-soft);}
input,textarea,select{width:100%; padding:12px 14px; border-radius:12px;
  border:1px solid var(--line); font-size:16px; color:var(--ink);
  background:#FBFAF7; outline:none; font-family:inherit;}
input:focus,textarea:focus{border-color:var(--accent);}
#search{padding-left:38px; background:var(--card);}
.clearbtn{position:absolute; right:6px; top:6px; background:none; border:none;
  color:var(--ink-soft); padding:6px; cursor:pointer; display:none;}

/* Sync status */
#syncchip{display:inline-flex; align-items:center; gap:6px; font-size:12px;
  font-weight:600; color:var(--ink-soft); padding:5px 10px; border-radius:999px;
  background:var(--card); border:1px solid var(--line); cursor:pointer;}
#syncchip .dot{width:8px; height:8px; border-radius:50%; background:#B9B9B0;}
#syncchip.ok .dot{background:var(--ok);}
#syncchip.busy .dot{background:#E8A21D; animation:pulse 1s infinite;}
#syncchip.err .dot{background:var(--danger);}
@keyframes pulse{50%{opacity:.35;}}
.banner{margin:10px 18px 0; padding:12px 14px; border-radius:12px; font-size:13.5px;
  line-height:1.5; background:#EEF2FF; border:1px solid #D6DEFA; color:#2A3766;}
.banner b{font-weight:700;}
.banner button{margin-top:8px;}

.grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:8px 18px;}
.foldercard{cursor:pointer; position:relative;}
.folder-tab{width:46%; height:12px; border-radius:8px 8px 0 0; margin-left:10px; opacity:.9;}
.folder-body{border:1px solid var(--line); border-radius:4px 12px 12px 12px;
  padding:14px 12px 12px; min-height:88px; display:flex; flex-direction:column;
  justify-content:space-between; border-top-width:3px; border-top-style:solid;}
.folder-top{display:flex; justify-content:space-between; align-items:flex-start; gap:6px;}
.folder-name{font-weight:650; font-size:15px; line-height:1.25; word-break:break-word;}
.folder-count{font-size:12px; color:var(--ink-soft); margin-top:8px;}
.menudots{background:none; border:none; color:var(--ink-soft); padding:2px;
  margin-top:-2px; cursor:pointer;}

.list{border-radius:14px; overflow:hidden; border:1px solid var(--line);
  margin:8px 18px 0;}
.item{display:flex; align-items:center; gap:12px; padding:13px 14px;
  background:var(--card); border-bottom:1px solid var(--line); cursor:pointer;}
.item:last-child{border-bottom:none;}
.item-ic{width:38px; height:38px; border-radius:10px; display:flex;
  align-items:center; justify-content:center; flex-shrink:0;}
.item-main{flex:1; min-width:0;}
.item-name{font-size:15px; font-weight:550; white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis;}
.item-meta{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.resultcount{font-size:13px; color:var(--ink-soft); margin:8px 20px;}

.empty{text-align:center; padding:60px 30px; color:var(--ink-soft);}
.empty .emoji{font-size:40px;}
.empty .big{font-size:16px; font-weight:650; color:var(--ink); margin-top:10px;}
.empty .small{font-size:14px; margin-top:6px; line-height:1.5;}

#fab{position:fixed; bottom:calc(24px + var(--safe-bot)); right:20px;
  width:58px; height:58px; border-radius:20px; background:var(--ink); color:#fff;
  border:none; display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 24px rgba(30,36,51,.35); z-index:20; cursor:pointer;}

.sheet-backdrop{position:fixed; inset:0; z-index:50; background:rgba(20,24,35,.45);
  display:none;}
.sheet{position:fixed; bottom:0; left:0; right:0; z-index:51; background:var(--card);
  border-radius:20px 20px 0 0; padding:10px 18px calc(28px + var(--safe-bot));
  max-height:88vh; overflow-y:auto; display:none; max-width:520px; margin:0 auto;}
.sheet .grab{width:40px; height:4px; border-radius:2px; background:var(--line);
  margin:6px auto 14px;}
.sheet .sheet-title{font-size:17px; font-weight:700; margin-bottom:14px;}
.btn{width:100%; padding:13px 16px; border-radius:12px; border:1px solid var(--line);
  background:var(--card); color:var(--ink); font-size:15px; font-weight:600;
  margin-top:10px; cursor:pointer; text-align:center;}
.btn.primary{background:var(--accent); color:#fff; border:none;}
.btn.danger-text{color:var(--danger);}
.btn.danger{background:var(--danger); color:#fff; border:none;}
.btn.row{display:flex; align-items:center; gap:14px; text-align:left;}
.opt-ic{width:42px; height:42px; border-radius:12px; display:flex;
  align-items:center; justify-content:center; flex-shrink:0;}
.opt-label{font-size:15px; font-weight:650;}
.opt-desc{font-size:13px; color:var(--ink-soft); margin-top:2px;}
.colors{display:flex; gap:10px; margin-top:14px;}
.colorpick{width:34px; height:34px; border-radius:50%; border:3px solid transparent;
  cursor:pointer;}
.colorpick.sel{border-color:var(--ink);}
.hint{font-size:13.5px; color:var(--ink-soft); line-height:1.55; margin-top:8px;}
.hint a{color:var(--accent);}
.chip{width:12px; height:12px; border-radius:4px; display:inline-block; flex-shrink:0;}
.label{font-size:13px; font-weight:650; color:var(--ink-soft); margin:14px 2px 6px;}
.progress{height:6px; border-radius:3px; background:var(--line); overflow:hidden;
  margin-top:12px; display:none;}
.progress>div{height:100%; width:0%; background:var(--accent); transition:width .2s;}

#viewer{position:fixed; inset:0; background:var(--bg); z-index:70; display:none;
  flex-direction:column;}
#viewer .vhead{display:flex; align-items:center; gap:10px;
  padding:calc(12px + var(--safe-top)) 16px 12px; border-bottom:1px solid var(--line);
  background:var(--card);}
#viewer .vtitle{font-size:16px; font-weight:700; flex:1; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;}
#viewer .vbody{flex:1; overflow:auto; -webkit-overflow-scrolling:touch;}
#viewer .vbody.note{padding:16px 16px calc(16px + var(--safe-bot));}
#viewer textarea{min-height:55vh; background:var(--card); line-height:1.6; resize:none;}
#viewer img{width:100%; display:block;}
#viewer iframe{width:100%; height:100%; border:none; min-height:80vh;}

#toast{position:fixed; bottom:calc(96px + var(--safe-bot)); left:50%;
  transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px;
  border-radius:999px; font-size:14px; z-index:80; white-space:nowrap;
  display:none; box-shadow:0 6px 18px rgba(0,0,0,.25); max-width:90vw;
  overflow:hidden; text-overflow:ellipsis;}

@media (prefers-reduced-motion:no-preference){
  .sheet{animation:up .22s ease;}
  @keyframes up{from{transform:translateY(30px); opacity:.6;} to{transform:none; opacity:1;}}
}
</style>
</head>
<body>
<div id="app">
  <div class="header" id="header"></div>
  <div id="banner"></div>
  <div id="content"></div>
</div>

<button id="fab" aria-label="Ajouter">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet"></div>
<div id="viewer"></div>
<div id="toast"></div>
<input type="file" id="filepick" style="display:none">

<script>
/* ================= Constantes ================= */
const FOLDER_COLORS = [
  {c:"#3B6CF6", soft:"#E8EEFE"}, {c:"#2E9E6B", soft:"#E5F5ED"},
  {c:"#E8842C", soft:"#FCEFE1"}, {c:"#D9494F", soft:"#FBE7E8"},
  {c:"#7A4FD0", soft:"#F0EAFB"}, {c:"#D9A404", soft:"#FAF3D9"},
];
const MAX_FILE_MB = 20;
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const esc = s => String(s??"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const fmtSize = b => !b ? "" : b<1024 ? b+" o" : b<1048576 ? (b/1024).toFixed(0)+" Ko" : (b/1048576).toFixed(1)+" Mo";
const fmtDate = ts => new Date(ts).toLocaleDateString("fr-FR",{day:"numeric",month:"short"});

const IC = {
  back:'<path d="M15 18l-6-6 6-6"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
  note:'<path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/><path d="M8 13h8M8 17h5"/>',
  link:'<path d="M10 14a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 10a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7L12 18"/>',
  file:'<path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/>',
  image:'<rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M21 16l-5-5-9 9"/>',
  dots:'<circle cx="12" cy="5" r="1.6" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.6" fill="currentColor" stroke="none"/>',
  download:'<path d="M12 4v11"/><path d="M7 11l5 5 5-5"/><path d="M4 20h16"/>',
  x:'<path d="M6 6l12 12M18 6L6 18"/>',
  gear:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  cloud:'<path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.7 1.6A4 4 0 0 0 6.5 19z"/>',
};
const svg = (name, size=20, sw=1.8) =>
  `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${IC[name]}</svg>`;

/* ================= IndexedDB (cache local) ================= */
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const rq = indexedDB.open("cartable", 2);
    rq.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains("meta")) d.createObjectStore("meta");
      if(!d.objectStoreNames.contains("files")) d.createObjectStore("files");
    };
    rq.onsuccess = e => { db = e.target.result; res(); };
    rq.onerror = () => rej(rq.error);
  });
}
const tx = (s,m) => db.transaction(s,m).objectStore(s);
const idbGet = (s,k) => new Promise((res,rej)=>{ const r=tx(s,"readonly").get(k); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); });
const idbSet = (s,k,v) => new Promise((res,rej)=>{ const r=tx(s,"readwrite").put(v,k); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); });
const idbDel = (s,k) => new Promise((res,rej)=>{ const r=tx(s,"readwrite").delete(k); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); });

/* ================= Config GitHub ================= */
function getCfg(){
  try{ return JSON.parse(localStorage.getItem("cartable:cfg")) || null; }catch(e){ return null; }
}
function setCfg(c){ localStorage.setItem("cartable:cfg", JSON.stringify(c)); }
const hasCloud = () => { const c=getCfg(); return !!(c && c.token && c.owner && c.repo); };

/* ================= GitHub API ================= */
const shaCache = {}; // path -> sha
function ghHeaders(extra={}){
  const c = getCfg();
  return Object.assign({
    "Authorization": "Bearer " + c.token,
    "X-GitHub-Api-Version": "2022-11-28",
  }, extra);
}
function ghUrl(path){
  const c = getCfg();
  return `https://api.github.com/repos/${c.owner}/${c.repo}/contents/${path}`;
}
async function ghGetMeta(path){ // -> {sha, size} ou null si absent
  const r = await fetch(ghUrl(path), {headers: ghHeaders({"Accept":"application/vnd.github+json"}), cache:"no-store"});
  if(r.status===404) return null;
  if(!r.ok) throw new Error("GitHub " + r.status);
  const j = await r.json();
  shaCache[path] = j.sha;
  return j;
}
async function ghGetRaw(path){ // -> Blob ou null
  const r = await fetch(ghUrl(path), {headers: ghHeaders({"Accept":"application/vnd.github.raw"}), cache:"no-store"});
  if(r.status===404) return null;
  if(!r.ok) throw new Error("GitHub " + r.status);
  return await r.blob();
}
async function ghPut(path, base64Content, message){
  const body = { message: message || ("maj " + path), content: base64Content, branch: getCfg().branch || "main" };
  if(shaCache[path]) body.sha = shaCache[path];
  let r = await fetch(ghUrl(path), {method:"PUT", headers: ghHeaders({"Accept":"application/vnd.github+json","Content-Type":"application/json"}), body: JSON.stringify(body)});
  if(r.status===409 || r.status===422){ // sha périmé ou manquant -> re-fetch puis retry
    const meta = await ghGetMeta(path);
    if(meta) body.sha = meta.sha; else delete body.sha;
    r = await fetch(ghUrl(path), {method:"PUT", headers: ghHeaders({"Accept":"application/vnd.github+json","Content-Type":"application/json"}), body: JSON.stringify(body)});
  }
  if(!r.ok) throw new Error("GitHub PUT " + r.status);
  const j = await r.json();
  shaCache[path] = j.content.sha;
}
async function ghDelete(path){
  let sha = shaCache[path];
  if(!sha){ const m = await ghGetMeta(path); if(!m) return; sha = m.sha; }
  const body = { message: "suppr " + path, sha, branch: getCfg().branch || "main" };
  const r = await fetch(ghUrl(path), {method:"DELETE", headers: ghHeaders({"Accept":"application/vnd.github+json","Content-Type":"application/json"}), body: JSON.stringify(body)});
  if(!r.ok && r.status!==404) throw new Error("GitHub DELETE " + r.status);
  delete shaCache[path];
}
async function blobToB64(blob){
  const buf = await blob.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let bin = "";
  const CH = 0x8000;
  for(let i=0; i<bytes.length; i+=CH){
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i+CH));
  }
  return btoa(bin);
}
const b64utf8 = s => btoa(unescape(encodeURIComponent(s)));

/* ================= État & sync ================= */
let data = { folders:[], items:[], updatedAt:0, pendingDeletes:[] };
let view = { page:"home", folderId:null };
let search = "";
let syncState = "off"; // off | ok | busy | err
let pushTimer = null;

function setSync(s, msg){
  syncState = s;
  const el = document.getElementById("syncchip");
  if(!el) return;
  el.className = s==="ok"?"ok":s==="busy"?"busy":s==="err"?"err":"";
  el.querySelector(".txt").textContent =
    s==="ok" ? "Synchronisé" :
    s==="busy" ? "Synchronisation…" :
    s==="err" ? (msg || "Hors ligne") : "Local seul";
}

async function loadLocal(){
  const saved = await idbGet("meta","index");
  if(saved) data = Object.assign({folders:[],items:[],updatedAt:0,pendingDeletes:[]}, saved);
}
async function saveLocal(){ await idbSet("meta","index", data); }

async function pullRemote(){
  if(!hasCloud()) { setSync("off"); return; }
  setSync("busy");
  try{
    const meta = await ghGetMeta("data/index.json");
    if(meta){
      const blob = await ghGetRaw("data/index.json");
      const remote = JSON.parse(await blob.text());
      if((remote.updatedAt||0) > (data.updatedAt||0)){
        // le cloud est plus récent -> on l'adopte (les fichiers seront récupérés à la demande)
        remote.pendingDeletes = data.pendingDeletes || [];
        data = Object.assign({folders:[],items:[],updatedAt:0,pendingDeletes:[]}, remote);
        await saveLocal();
        render();
      } else if((data.updatedAt||0) > (remote.updatedAt||0)){
        schedulePush(0); // on a des modifs locales plus récentes (faites hors ligne)
      }
    } else if(data.updatedAt){
      schedulePush(0); // premier envoi
    }
    await flushDeletes();
    setSync("ok");
  }catch(e){
    console.error(e);
    setSync("err", e.message.includes("401")||e.message.includes("403") ? "Jeton invalide" : "Hors ligne");
  }
}
function schedulePush(delay=1200){
  if(!hasCloud()) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushIndex, delay);
}
async function pushIndex(){
  if(!hasCloud()) return;
  setSync("busy");
  try{
    const payload = { folders:data.folders, items:data.items, updatedAt:data.updatedAt };
    await ghPut("data/index.json", b64utf8(JSON.stringify(payload)), "maj index");
    await flushDeletes();
    setSync("ok");
  }catch(e){ console.error(e); setSync("err"); }
}
async function flushDeletes(){
  const pend = data.pendingDeletes || [];
  if(!pend.length) return;
  const still = [];
  for(const p of pend){
    try{ await ghDelete(p); }catch(e){ still.push(p); }
  }
  data.pendingDeletes = still;
  await saveLocal();
}
async function touch(){ // à appeler après chaque modification
  data.updatedAt = Date.now();
  await saveLocal();
  schedulePush();
}

/* ================= UI helpers ================= */
const $ = id => document.getElementById(id);
let toastTimer;
function notify(msg){
  const t = $("toast"); t.textContent = msg; t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.style.display="none", 2400);
}
function openSheet(html){
  $("sheet").innerHTML = '<div class="grab"></div>' + html;
  $("sheet").style.display = "block";
  $("backdrop").style.display = "block";
}
function closeSheet(){
  $("sheet").style.display = "none";
  $("backdrop").style.display = "none";
}
$("backdrop").addEventListener("click", closeSheet);

/* ================= Rendu ================= */
function itemKind(it){
  if(it.type==="note") return {ic:"note", c:"#7A4FD0"};
  if(it.type==="link") return {ic:"link", c:"#2E9E6B"};
  if(it.mime && it.mime.startsWith("image/")) return {ic:"image", c:"#E8842C"};
  return {ic:"file", c:"#3B6CF6"};
}

function render(){
  const cur = data.folders.find(f=>f.id===view.folderId);
  let h = "";
  if(view.page==="home"){
    h = `<div class="eyebrow">Mes cours</div>
    <div class="titlerow">
      <div class="title">Cartable</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="syncchip"><span class="dot"></span><span class="txt">…</span></button>
        <button class="iconbtn" id="settingsbtn">${svg("gear",18)}</button>
      </div>
    </div>`;
  } else {
    h = `<div class="subhead">
      <button class="iconbtn" onclick="goHome()">${svg("back",18)}</button>
      <div class="name">${esc(cur ? cur.name : "")}</div>
      <button id="syncchip"><span class="dot"></span><span class="txt">…</span></button>
    </div>`;
  }
  h += `<div class="searchwrap">${svg("search",17)}
    <input id="search" placeholder="Rechercher dans tous les cours…" value="${esc(search)}">
    <button class="clearbtn" id="clearsearch" style="display:${search?'block':'none'}">${svg("x",16)}</button>
  </div>`;
  $("header").innerHTML = h;

  $("search").addEventListener("input", e => {
    search = e.target.value; renderContent();
    $("clearsearch").style.display = search?'block':'none';
    $("fab").style.display = search.trim()?'none':'flex';
  });
  $("clearsearch").addEventListener("click", ()=>{ search=""; render(); });
  $("syncchip").addEventListener("click", ()=> hasCloud() ? pullRemote() : settingsSheet());
  const sb = $("settingsbtn"); if(sb) sb.addEventListener("click", settingsSheet);

  setSync(syncState);
  $("fab").style.display = search.trim() ? "none" : "flex";

  // Bannière si pas de cloud configuré
  $("banner").innerHTML = hasCloud() ? "" :
    `<div class="banner"><b>Synchronisation désactivée.</b> Tes données restent sur cet appareil uniquement.
     Active la synchro GitHub pour retrouver tes cours partout (iPhone, PC…).
     <button class="btn primary" id="setupbtn" style="margin-top:10px">Activer la synchro</button></div>`;
  const sp = $("setupbtn"); if(sp) sp.addEventListener("click", settingsSheet);

  renderContent();
}

function renderContent(){
  const items = data.items;
  const c = $("content");

  if(search.trim()){
    const q = search.toLowerCase();
    const res = items.filter(i=>i.name.toLowerCase().includes(q));
    c.innerHTML = `<div class="resultcount">${res.length} résultat${res.length>1?"s":""}</div>
      <div class="list">${res.map(itemRowHTML).join("") ||
        '<div class="item" style="cursor:default;color:var(--ink-soft);font-size:14px;justify-content:center">Aucun élément trouvé.</div>'}</div>`;
    bindItemRows(res);
    return;
  }

  if(view.page==="home"){
    if(data.folders.length===0){
      c.innerHTML = `<div class="empty"><div class="emoji">📚</div>
        <div class="big">Ton cartable est vide</div>
        <div class="small">Crée un premier dossier pour une matière : Métrologie, Réseaux, Méca…</div></div>`;
      return;
    }
    c.innerHTML = `<div class="grid">` + data.folders.map(f=>{
      const col = FOLDER_COLORS.find(x=>x.c===f.color) || FOLDER_COLORS[0];
      const n = items.filter(i=>i.folderId===f.id).length;
      return `<div class="foldercard" data-id="${f.id}">
        <div class="folder-tab" style="background:${col.c}"></div>
        <div class="folder-body" style="background:${col.soft}; border-top-color:${col.c}">
          <div class="folder-top">
            <div class="folder-name">${esc(f.name)}</div>
            <button class="menudots" data-menu="${f.id}">${svg("dots",18)}</button>
          </div>
          <div class="folder-count">${n===0?"Vide":n===1?"1 élément":n+" éléments"}</div>
        </div>
      </div>`;
    }).join("") + `</div>`;
    c.querySelectorAll(".foldercard").forEach(el=>{
      el.addEventListener("click", ()=>{ view={page:"folder",folderId:el.dataset.id}; render(); });
    });
    c.querySelectorAll(".menudots").forEach(el=>{
      el.addEventListener("click", e=>{ e.stopPropagation(); folderMenu(el.dataset.menu); });
    });
  } else {
    const list = items.filter(i=>i.folderId===view.folderId).sort((a,b)=>b.createdAt-a.createdAt);
    if(list.length===0){
      c.innerHTML = `<div class="empty"><div class="emoji">🗂️</div>
        <div class="small">Dossier vide. Ajoute une note, un lien ou un fichier avec le bouton +.</div></div>`;
      return;
    }
    c.innerHTML = `<div class="list">${list.map(itemRowHTML).join("")}</div>`;
    bindItemRows(list);
  }
}

function itemRowHTML(it){
  const k = itemKind(it);
  return `<div class="item" data-id="${it.id}">
    <div class="item-ic" style="background:${k.c}1A;color:${k.c}">${svg(k.ic,19)}</div>
    <div class="item-main">
      <div class="item-name">${esc(it.name)}</div>
      <div class="item-meta">${fmtDate(it.createdAt)}${it.size?" · "+fmtSize(it.size):""}${it.type==="link"?" · lien":""}</div>
    </div>
    <button class="menudots" data-menu="${it.id}">${svg("dots",18)}</button>
  </div>`;
}
function bindItemRows(list){
  document.querySelectorAll(".item[data-id]").forEach(el=>{
    el.addEventListener("click", ()=> openItem(list.find(i=>i.id===el.dataset.id)));
  });
  document.querySelectorAll(".item .menudots").forEach(el=>{
    el.addEventListener("click", e=>{ e.stopPropagation(); itemMenu(el.dataset.menu); });
  });
}
function goHome(){ view={page:"home",folderId:null}; search=""; render(); }

/* ================= Réglages / synchro ================= */
function settingsSheet(){
  const c = getCfg() || {owner:"", repo:"cartable-data", token:"", branch:"main"};
  openSheet(`<div class="sheet-title">Synchronisation GitHub</div>
    <div class="hint">Tes dossiers et fichiers seront stockés dans un dépôt GitHub <b>privé</b>,
    accessibles depuis tous tes appareils avec cette même app.</div>
    <div class="label">Nom d'utilisateur GitHub</div>
    <input id="cfg-owner" value="${esc(c.owner)}" placeholder="ex : bousquetkillian" autocapitalize="none" autocorrect="off">
    <div class="label">Nom du dépôt privé</div>
    <input id="cfg-repo" value="${esc(c.repo)}" placeholder="cartable-data" autocapitalize="none" autocorrect="off">
    <div class="label">Jeton d'accès (token)</div>
    <input id="cfg-token" value="${esc(c.token)}" placeholder="github_pat_…" type="password" autocapitalize="none" autocorrect="off">
    <div class="hint">Le jeton est enregistré uniquement sur cet appareil. Il faut le saisir une fois par appareil.</div>
    <button class="btn primary" id="cfg-save">Tester et activer</button>
    ${hasCloud() ? '<button class="btn danger-text" id="cfg-off">Désactiver la synchro sur cet appareil</button>' : ''}`);
  $("cfg-save").addEventListener("click", async ()=>{
    const cfg = {
      owner: $("cfg-owner").value.trim(),
      repo: $("cfg-repo").value.trim() || "cartable-data",
      token: $("cfg-token").value.trim(),
      branch: "main",
    };
    if(!cfg.owner || !cfg.token){ notify("Remplis le nom d'utilisateur et le jeton"); return; }
    setCfg(cfg);
    $("cfg-save").textContent = "Test en cours…";
    try{
      const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}`, {headers: ghHeaders({"Accept":"application/vnd.github+json"})});
      if(r.status===404) throw new Error("Dépôt introuvable — vérifie le nom et que le jeton a accès à ce dépôt");
      if(r.status===401) throw new Error("Jeton invalide");
      if(!r.ok) throw new Error("Erreur GitHub " + r.status);
      closeSheet();
      notify("Synchro activée ✓");
      await pullRemote();
      render();
    }catch(e){
      $("cfg-save").textContent = "Tester et activer";
      notify(e.message);
    }
  });
  const off = $("cfg-off");
  if(off) off.addEventListener("click", ()=>{
    localStorage.removeItem("cartable:cfg");
    closeSheet(); setSync("off"); render();
    notify("Synchro désactivée sur cet appareil");
  });
}

/* ================= Dossiers ================= */
$("fab").addEventListener("click", ()=>{
  if(view.page==="home") newFolderSheet(); else addItemSheet();
});

function newFolderSheet(){
  let color = FOLDER_COLORS[0].c;
  openSheet(`<div class="sheet-title">Nouveau dossier</div>
    <input id="fname" placeholder="Nom de la matière (ex : Métrologie)">
    <div class="colors">${FOLDER_COLORS.map((f,i)=>
      `<button class="colorpick ${i===0?'sel':''}" data-c="${f.c}" style="background:${f.c}"></button>`).join("")}</div>
    <button class="btn primary" id="createf">Créer le dossier</button>`);
  document.querySelectorAll(".colorpick").forEach(b=>{
    b.addEventListener("click", ()=>{
      document.querySelectorAll(".colorpick").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel"); color = b.dataset.c;
    });
  });
  $("fname").focus();
  $("createf").addEventListener("click", async ()=>{
    const name = $("fname").value.trim();
    if(!name) return;
    data.folders.push({id:uid(), name, color, createdAt:Date.now()});
    await touch(); closeSheet(); render();
  });
}

function folderMenu(id){
  const f = data.folders.find(x=>x.id===id);
  openSheet(`<div class="sheet-title">${esc(f.name)}</div>
    <button class="btn" id="rn">Renommer</button>
    <button class="btn danger-text" id="del">Supprimer le dossier</button>`);
  $("rn").addEventListener("click", ()=>{
    openSheet(`<div class="sheet-title">Renommer</div>
      <input id="fname" value="${esc(f.name)}">
      <button class="btn primary" id="save">Enregistrer</button>`);
    $("fname").focus();
    $("save").addEventListener("click", async ()=>{
      f.name = $("fname").value.trim() || f.name;
      await touch(); closeSheet(); render();
    });
  });
  $("del").addEventListener("click", ()=>{
    openSheet(`<div class="sheet-title">${esc(f.name)}</div>
      <div class="hint">Le dossier et tout son contenu seront supprimés définitivement, sur tous tes appareils.</div>
      <button class="btn danger" id="yes">Oui, supprimer</button>
      <button class="btn" id="no">Annuler</button>`);
    $("no").addEventListener("click", closeSheet);
    $("yes").addEventListener("click", async ()=>{
      const gone = data.items.filter(i=>i.folderId===id && i.type==="file");
      for(const it of gone){
        try{ await idbDel("files", it.id); }catch(e){}
        data.pendingDeletes.push("data/files/" + it.id);
      }
      data.folders = data.folders.filter(x=>x.id!==id);
      data.items = data.items.filter(i=>i.folderId!==id);
      await touch(); closeSheet();
      if(view.folderId===id) view={page:"home",folderId:null};
      render(); notify("Dossier supprimé");
    });
  });
}

/* ================= Ajouts ================= */
function addItemSheet(){
  const opt = (ic, col, label, desc, id) =>
    `<button class="btn row" id="${id}">
      <div class="opt-ic" style="background:${col}1A;color:${col}">${svg(ic,21)}</div>
      <div><div class="opt-label">${label}</div><div class="opt-desc">${desc}</div></div>
    </button>`;
  openSheet(`<div class="sheet-title">Ajouter au dossier</div>
    ${opt("file","#3B6CF6","Fichier",`PDF, image, doc… (max ${MAX_FILE_MB} Mo)`,"addfile")}
    ${opt("note","#7A4FD0","Note","Prise de notes rapide","addnote")}
    ${opt("link","#2E9E6B","Lien","Drive, Moodle, vidéo, site…","addlink")}
    <div class="progress" id="upprog"><div></div></div>`);
  $("addfile").addEventListener("click", ()=>{ closeSheet(); $("filepick").click(); });
  $("addnote").addEventListener("click", newNoteSheet);
  $("addlink").addEventListener("click", newLinkSheet);
}

$("filepick").addEventListener("change", async e=>{
  const f = e.target.files && e.target.files[0];
  e.target.value = "";
  if(!f) return;
  if(f.size > MAX_FILE_MB*1048576){ notify(`Fichier trop lourd (max ${MAX_FILE_MB} Mo)`); return; }
  const id = uid();
  try{
    await idbSet("files", id, f);
    data.items.push({id, folderId:view.folderId, type:"file", name:f.name, mime:f.type, size:f.size, createdAt:Date.now()});
    await touch(); render();
    if(hasCloud()){
      notify("Envoi vers le cloud…");
      setSync("busy");
      try{
        const b64 = await blobToB64(f);
        await ghPut("data/files/" + id, b64, "ajout " + f.name);
        setSync("ok");
        notify("Fichier synchronisé ✓");
      }catch(err){
        console.error(err);
        setSync("err");
        notify("Enregistré ici, envoi cloud à réessayer");
      }
    } else {
      notify("Fichier ajouté (local)");
    }
  }catch(err){ notify("Échec de l'enregistrement"); }
});

function newNoteSheet(){
  openSheet(`<div class="sheet-title">Nouvelle note</div>
    <input id="nname" placeholder="Titre de la note">
    <textarea id="ncontent" rows="6" placeholder="Contenu…" style="margin-top:10px"></textarea>
    <button class="btn primary" id="create">Créer la note</button>`);
  $("nname").focus();
  $("create").addEventListener("click", async ()=>{
    const name = $("nname").value.trim();
    if(!name) return;
    data.items.push({id:uid(), folderId:view.folderId, type:"note", name, content:$("ncontent").value, createdAt:Date.now()});
    await touch(); closeSheet(); render();
  });
}

function newLinkSheet(){
  openSheet(`<div class="sheet-title">Nouveau lien</div>
    <input id="lurl" placeholder="URL (Drive, Moodle, YouTube…)" inputmode="url" autocapitalize="none">
    <input id="lname" placeholder="Nom (optionnel)" style="margin-top:10px">
    <button class="btn primary" id="create">Ajouter le lien</button>`);
  $("lurl").focus();
  $("create").addEventListener("click", async ()=>{
    let url = $("lurl").value.trim();
    if(!url) return;
    if(!/^https?:\/\//i.test(url)) url = "https://" + url;
    data.items.push({id:uid(), folderId:view.folderId, type:"link", name:$("lname").value.trim()||url, url, createdAt:Date.now()});
    await touch(); closeSheet(); render();
  });
}

/* ================= Menu élément ================= */
function itemMenu(id){
  const it = data.items.find(x=>x.id===id);
  openSheet(`<div class="sheet-title">${esc(it.name)}</div>
    <button class="btn" id="rn">Renommer</button>
    <button class="btn" id="mv">Déplacer vers…</button>
    <button class="btn danger-text" id="del">Supprimer</button>`);
  $("rn").addEventListener("click", ()=>{
    openSheet(`<div class="sheet-title">Renommer</div>
      <input id="iname" value="${esc(it.name)}">
      <button class="btn primary" id="save">Enregistrer</button>`);
    $("iname").focus();
    $("save").addEventListener("click", async ()=>{
      it.name = $("iname").value.trim() || it.name;
      await touch(); closeSheet(); render();
    });
  });
  $("mv").addEventListener("click", ()=>{
    const others = data.folders.filter(f=>f.id!==it.folderId);
    openSheet(`<div class="sheet-title">Déplacer vers…</div>` +
      (others.length ? others.map(f=>
        `<button class="btn row" data-f="${f.id}"><span class="chip" style="background:${f.color}"></span>${esc(f.name)}</button>`).join("")
        : `<div class="hint">Aucun autre dossier disponible.</div>`));
    document.querySelectorAll("[data-f]").forEach(b=>{
      b.addEventListener("click", async ()=>{
        it.folderId = b.dataset.f;
        await touch(); closeSheet(); render(); notify("Déplacé");
      });
    });
  });
  $("del").addEventListener("click", async ()=>{
    if(it.type==="file"){
      try{ await idbDel("files", it.id); }catch(e){}
      data.pendingDeletes.push("data/files/" + it.id);
    }
    data.items = data.items.filter(x=>x.id!==it.id);
    await touch(); closeSheet(); render(); notify("Supprimé");
  });
}

/* ================= Ouverture / Viewer ================= */
let currentObjectURL = null;
async function openItem(it){
  if(!it) return;
  if(it.type==="link"){ window.open(it.url, "_blank"); return; }

  const v = $("viewer");
  const head = (extra="") => `<div class="vhead">
    <button class="iconbtn" id="vclose">${svg("back",18)}</button>
    <div class="vtitle">${esc(it.name)}</div>${extra}</div>`;

  if(it.type==="note"){
    v.innerHTML = head() + `<div class="vbody note">
      <textarea id="vtext">${esc(it.content||"")}</textarea>
      <button class="btn primary" id="vsave">Enregistrer la note</button></div>`;
    v.style.display = "flex";
    $("vclose").addEventListener("click", closeViewer);
    $("vsave").addEventListener("click", async ()=>{
      it.content = $("vtext").value;
      await touch(); notify("Note enregistrée");
    });
    return;
  }

  // fichier : cache local d'abord, sinon cloud
  let blob = null;
  try{ blob = await idbGet("files", it.id); }catch(e){}
  if(!blob && hasCloud()){
    notify("Téléchargement depuis le cloud…");
    try{
      blob = await ghGetRaw("data/files/" + it.id);
      if(blob){
        blob = new Blob([blob], {type: it.mime || "application/octet-stream"});
        await idbSet("files", it.id, blob); // mise en cache pour la prochaine fois
      }
    }catch(e){ console.error(e); }
  }
  if(!blob){ notify("Contenu introuvable (vérifie ta connexion)"); return; }
  if(!blob.type && it.mime) blob = new Blob([blob], {type: it.mime});

  if(currentObjectURL) URL.revokeObjectURL(currentObjectURL);
  currentObjectURL = URL.createObjectURL(blob);
  const dl = `<a class="iconbtn" href="${currentObjectURL}" download="${esc(it.name)}">${svg("download",18)}</a>`;

  const isImg = it.mime && it.mime.startsWith("image/");
  const isPdf = it.mime === "application/pdf";
  let body;
  if(isImg) body = `<div class="vbody"><img src="${currentObjectURL}" alt="${esc(it.name)}"></div>`;
  else if(isPdf) body = `<div class="vbody"><iframe src="${currentObjectURL}" title="${esc(it.name)}"></iframe></div>`;
  else body = `<div class="vbody"><div class="empty"><div class="small">Aperçu indisponible pour ce type de fichier.<br>Utilise le bouton de téléchargement en haut à droite.</div></div></div>`;

  v.innerHTML = head(dl) + body;
  v.style.display = "flex";
  $("vclose").addEventListener("click", closeViewer);
}
function closeViewer(){
  $("viewer").style.display = "none";
  $("viewer").innerHTML = "";
  if(currentObjectURL){ URL.revokeObjectURL(currentObjectURL); currentObjectURL = null; }
}

/* ================= Init ================= */
(async ()=>{
  try{
    await openDB();
    await loadLocal();
    if(navigator.storage && navigator.storage.persist){
      try{ await navigator.storage.persist(); }catch(e){}
    }
  }catch(e){ console.error(e); }
  render();
  pullRemote(); // en arrière-plan
  // re-sync quand on revient sur l'app
  document.addEventListener("visibilitychange", ()=>{
    if(document.visibilityState==="visible") pullRemote();
  });
})();
